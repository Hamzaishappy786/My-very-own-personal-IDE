<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; worker-src 'self' blob:; connect-src 'self' https://api.groq.com;" />
  <title>Hator</title>
  <link rel="stylesheet" href="../../node_modules/@xterm/xterm/css/xterm.css" />
  <link rel="stylesheet" href="tailwind.build.css" />
</head>
<body>
  <div id="app" class="flex h-screen w-screen bg-dracula-bg text-dracula-fg text-sm">
    <div id="sidebar" class="flex flex-col overflow-hidden bg-dracula-bg border-r border-dracula-current/50 transition-[width,opacity] duration-200 ease-in-out" style="width: 240px; min-width: 240px;">
      <div id="sidebar-header" class="flex flex-col gap-2 p-2 border-b border-dracula-current/50 transition-opacity duration-150">
        <span id="folder-name" class="text-[11px] uppercase tracking-wide text-dracula-comment truncate">No folder open</span>
        <button id="open-folder-btn" class="bg-dracula-purple hover:bg-dracula-pink transition-all duration-150 hover:scale-[1.03] active:scale-95 text-dracula-bg font-medium px-2.5 py-1.5 rounded text-xs">
          Open Folder
        </button>
      </div>
      <div id="file-tree" class="flex-1 overflow-y-auto py-1 text-[13px] transition-opacity duration-150"></div>
    </div>

    <div id="editor-area" class="flex-1 flex flex-col overflow-hidden">
      <div class="relative flex items-center bg-dracula-current/30 border-b border-dracula-bg">
        <button id="sidebar-toggle-btn" title="Toggle sidebar" class="flex items-center justify-center w-9 h-8 text-dracula-comment hover:text-dracula-fg hover:bg-dracula-current/60 transition-all duration-150 hover:scale-110 active:scale-90 shrink-0">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" class="w-4 h-4 transition-transform duration-200">
            <path d="M1 2.5A1.5 1.5 0 0 1 2.5 1h11A1.5 1.5 0 0 1 15 2.5v11a1.5 1.5 0 0 1-1.5 1.5h-11A1.5 1.5 0 0 1 1 13.5v-11ZM2.5 2a.5.5 0 0 0-.5.5v11a.5.5 0 0 0 .5.5H6V2H2.5ZM7 2v12h6.5a.5.5 0 0 0 .5-.5v-11a.5.5 0 0 0-.5-.5H7Z"/>
          </svg>
        </button>
        <div id="tabs" class="flex-1 flex overflow-x-auto"></div>

        <button id="run-btn" title="Open a runnable file to enable Run" disabled class="flex items-center justify-center w-9 h-8 text-dracula-comment hover:text-dracula-fg hover:bg-dracula-current/60 transition-all duration-150 hover:scale-110 active:scale-90 shrink-0 disabled:opacity-40 disabled:pointer-events-none disabled:hover:scale-100">
          <svg id="run-icon-play" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" class="w-4 h-4 text-dracula-green">
            <path d="M4.5 3.5v9l8-4.5-8-4.5Z"/>
          </svg>
          <svg id="run-icon-stop" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" class="w-4 h-4 text-dracula-red hidden">
            <rect x="4" y="4" width="8" height="8" rx="1"/>
          </svg>
        </button>

        <button id="terminal-toggle-btn" title="Toggle terminal (Ctrl+`)" class="flex items-center justify-center w-9 h-8 text-dracula-comment hover:text-dracula-fg hover:bg-dracula-current/60 transition-all duration-150 hover:scale-110 active:scale-90 shrink-0">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" class="w-4 h-4">
            <path fill-rule="evenodd" d="M0 3a1 1 0 0 1 1-1h14a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H1a1 1 0 0 1-1-1V3Zm2.28 2.22a.75.75 0 0 0 0 1.06l1.72 1.72-1.72 1.72a.75.75 0 1 0 1.06 1.06l2.25-2.25a.75.75 0 0 0 0-1.06L3.34 5.22a.75.75 0 0 0-1.06 0ZM7.75 9.5a.75.75 0 0 0 0 1.5h3a.75.75 0 0 0 0-1.5h-3Z" clip-rule="evenodd"/>
          </svg>
        </button>

        <button id="settings-btn" title="Settings" class="flex items-center justify-center w-9 h-8 text-dracula-comment hover:text-dracula-fg hover:bg-dracula-current/60 transition-all duration-150 hover:scale-110 active:scale-90 hover:rotate-45 shrink-0">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" class="w-4 h-4">
            <path d="M8 4.754a3.246 3.246 0 1 0 0 6.492 3.246 3.246 0 0 0 0-6.492ZM5.754 8a2.246 2.246 0 1 1 4.492 0 2.246 2.246 0 0 1-4.492 0Z"/>
            <path d="M9.796 1.343c-.527-1.79-3.065-1.79-3.592 0l-.094.319a.873.873 0 0 1-1.255.52l-.292-.16c-1.64-.892-3.433.902-2.54 2.541l.159.292a.873.873 0 0 1-.52 1.255l-.319.094c-1.79.527-1.79 3.065 0 3.592l.319.094a.873.873 0 0 1 .52 1.255l-.16.292c-.892 1.64.901 3.434 2.541 2.54l.292-.159a.873.873 0 0 1 1.255.52l.094.319c.527 1.79 3.065 1.79 3.592 0l.094-.319a.873.873 0 0 1 1.255-.52l.292.16c1.64.893 3.434-.902 2.54-2.541l-.159-.292a.873.873 0 0 1 .52-1.255l.319-.094c1.79-.527 1.79-3.065 0-3.592l-.319-.094a.873.873 0 0 1-.52-1.255l.16-.292c.893-1.64-.902-3.433-2.541-2.54l-.292.159a.873.873 0 0 1-1.255-.52l-.094-.319Z"/>
          </svg>
        </button>
      </div>
      <div id="editor-container" class="flex-1 overflow-hidden"></div>

      <div id="terminal-resizer" class="h-1 cursor-row-resize bg-dracula-current/30 hover:bg-dracula-purple transition-colors duration-150 shrink-0" title="Drag to resize terminal"></div>

      <div id="terminal-panel" class="shrink-0 border-t border-dracula-current/50 bg-dracula-bg">
        <div class="flex items-center justify-between gap-2 px-2 h-8 border-b border-dracula-current/50 bg-dracula-current/20 shrink-0">
          <div class="flex items-center gap-2">
            <span class="text-[11px] uppercase tracking-wide text-dracula-comment">Terminal</span>
            <select
              id="terminal-shell-select"
              class="text-[12px] bg-dracula-current/40 text-dracula-fg rounded px-1.5 py-0.5 border border-dracula-current focus:outline-none cursor-pointer"
            ></select>
          </div>
          <button
            id="terminal-close-btn"
            title="Hide terminal (Ctrl+`)"
            class="flex items-center justify-center w-6 h-6 rounded text-dracula-comment hover:text-dracula-fg hover:bg-dracula-current/60 transition-all duration-150 hover:scale-110 active:scale-90"
          >
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" class="w-3.5 h-3.5">
              <path d="M2.22 2.22a.75.75 0 0 1 1.06 0L8 6.94l4.72-4.72a.75.75 0 1 1 1.06 1.06L9.06 8l4.72 4.72a.75.75 0 1 1-1.06 1.06L8 9.06l-4.72 4.72a.75.75 0 0 1-1.06-1.06L6.94 8 2.22 3.28a.75.75 0 0 1 0-1.06Z"/>
            </svg>
          </button>
        </div>
        <div id="terminal-mount" class="overflow-hidden px-2 py-1"></div>
      </div>

      <div id="settings-modal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 opacity-0 pointer-events-none transition-opacity duration-200 ease-out">
        <div id="settings-panel" class="flex flex-col w-[420px] max-h-[70vh] rounded-lg border border-dracula-current bg-dracula-bg shadow-2xl scale-95 transition-transform duration-200 ease-out">
          <div class="flex items-center justify-between px-4 py-3 border-b border-dracula-current/50">
            <h2 class="text-sm font-semibold text-dracula-fg">Settings</h2>
            <button id="settings-close-btn" title="Close" class="flex items-center justify-center w-7 h-7 rounded text-dracula-comment hover:text-dracula-fg hover:bg-dracula-current/60 transition-all duration-150 hover:scale-110 active:scale-90">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" class="w-3.5 h-3.5">
                <path d="M2.22 2.22a.75.75 0 0 1 1.06 0L8 6.94l4.72-4.72a.75.75 0 1 1 1.06 1.06L9.06 8l4.72 4.72a.75.75 0 1 1-1.06 1.06L8 9.06l-4.72 4.72a.75.75 0 0 1-1.06-1.06L6.94 8 2.22 3.28a.75.75 0 0 1 0-1.06Z"/>
              </svg>
            </button>
          </div>

          <div class="px-4 py-3 border-b border-dracula-current/50">
            <div class="relative">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" class="w-3.5 h-3.5 absolute left-2 top-1/2 -translate-y-1/2 text-dracula-comment">
                <path fill-rule="evenodd" d="M10.442 10.442a1 1 0 0 1 1.415 0l3.85 3.85a1 1 0 0 1-1.414 1.415l-3.85-3.85a1 1 0 0 1 0-1.415ZM6.75 12.5a5.75 5.75 0 1 0 0-11.5 5.75 5.75 0 0 0 0 11.5Z" clip-rule="evenodd"/>
              </svg>
              <input
                id="settings-search"
                type="text"
                placeholder="Search settings..."
                autocomplete="off"
                class="w-full pl-7 pr-2 py-1.5 rounded bg-dracula-current/30 border border-dracula-current text-dracula-fg text-[13px] placeholder:text-dracula-comment focus:outline-none focus:ring-1 focus:ring-dracula-purple"
              />
            </div>
          </div>

          <div id="settings-body" class="flex-1 overflow-y-auto py-2">
            <div class="settings-section" data-section="appearance">
              <div class="px-4 pt-1 pb-1 text-[11px] uppercase tracking-wide text-dracula-comment">Appearance</div>
              <div id="theme-menu-list"></div>
            </div>

            <div class="settings-section" data-section="integrations">
              <div class="px-4 pt-3 pb-1 text-[11px] uppercase tracking-wide text-dracula-comment">Integrations</div>
              <div
                class="settings-item px-4 py-2"
                data-keywords="groq api key ai error explain assistant run llm"
              >
                <label for="groq-api-key-input" class="block text-[13px] text-dracula-fg mb-1">Groq API Key</label>
                <input
                  id="groq-api-key-input"
                  type="password"
                  autocomplete="off"
                  placeholder="gsk_..."
                  class="w-full px-2 py-1.5 rounded bg-dracula-current/30 border border-dracula-current text-dracula-fg text-[13px] placeholder:text-dracula-comment focus:outline-none focus:ring-1 focus:ring-dracula-purple"
                />
                <p class="mt-1 text-[10px] italic text-dracula-comment">Used to explain Run errors in plain English. Stored locally only.</p>
              </div>
            </div>

            <div id="settings-empty" class="hidden px-4 py-6 text-center text-[12px] text-dracula-comment">
              No settings found.
            </div>
          </div>
        </div>
      </div>

      <div id="status-bar" class="flex items-center justify-between h-6 px-3 text-[11px] bg-dracula-current/30 border-t border-dracula-bg text-dracula-comment shrink-0">
        <span id="status-left"></span>
        <span id="save-toast" class="flex items-center gap-1 text-dracula-green opacity-0 translate-y-0.5 transition-all duration-300 ease-out">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" class="w-3 h-3">
            <path d="M13.78 4.22a.75.75 0 0 1 0 1.06l-7.25 7.25a.75.75 0 0 1-1.06 0L2.22 9.28a.75.75 0 0 1 1.06-1.06L6 10.94l6.72-6.72a.75.75 0 0 1 1.06 0Z"/>
          </svg>
          Saved
        </span>
      </div>
    </div>
  </div>
  <!--
    xterm's UMD wrapper checks for a global AMD `define` and, if present,
    registers itself as an AMD module instead of attaching to `window`.
    Monaco's loader.js installs exactly that global, so xterm + its addons
    must load and evaluate BEFORE loader.js runs.
  -->
  <script src="../../node_modules/@xterm/xterm/lib/xterm.js"></script>
  <script src="../../node_modules/@xterm/addon-fit/lib/addon-fit.js"></script>
  <script src="../../node_modules/monaco-editor/min/vs/loader.js"></script>
  <script src="themes.js"></script>
  <script src="terminal.js"></script>
  <script src="gitDiff.js"></script>
  <script src="runner.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
